name: pytest

on:
  push:
  pull_request:

jobs:
  pytest:
    name: Run tests with pytest
    runs-on: ubuntu-latest
    steps:
      # checkout repository
      - name: Checkout
        uses: actions/checkout@v2
      # setup runtime
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'
          architecture: 'x64'
      # install
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .
          pip install numpy
      - name: Run Tests
        run: python -m pytest tests
        continue-on-error: true
